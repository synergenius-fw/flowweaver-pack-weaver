<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>genesisTask — Flow Weaver</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  font-family: Montserrat, 'Segoe UI', Roboto, sans-serif;
  color: #e8e8ee;
}

#canvas {
  display: block; width: 100%; height: 100%;
  cursor: grab;
  touch-action: none; user-select: none;
}
#canvas.dragging { cursor: grabbing; }

/* Port labels: hidden by default, shown on node hover */
.nodes > g .port-label,
.nodes > g .port-type-label,
.labels g[data-port-label] {
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s ease-in-out;
}

/* Connection hover & dimming (attribute selector covers both main and scope connections) */
path[data-source] { transition: opacity 0.2s ease, stroke-width 0.15s ease; }
path[data-source]:hover { stroke-width: 4; cursor: pointer; }
body.node-active path[data-source].dimmed,
body.port-active path[data-source].dimmed { opacity: 0.1; }
body.port-hovered path[data-source].dimmed { opacity: 0.25; }

/* Port circles are interactive */
circle[data-port-id] { cursor: pointer; }
circle[data-port-id]:hover { stroke-width: 3; filter: brightness(1.3); }

/* Port-click highlighting */
path[data-source].highlighted { opacity: 1; }
circle[data-port-id].port-selected { filter: drop-shadow(0 0 6px currentColor); stroke-width: 4; }

/* Node selection glow */
@keyframes select-pop {
  0% { opacity: 0; stroke-width: 0; }
  50% { opacity: 0.6; stroke-width: 12; }
  100% { opacity: 0.35; stroke-width: 8; }
}
.node-glow { fill: none; pointer-events: none; animation: select-pop 0.3s ease-out forwards; }

/* Port hover path highlight */
path[data-source].port-hover { opacity: 1; }

/* Node hover glow + draggable cursor */
.nodes g[data-node-id] { cursor: grab; }
.nodes g[data-node-id]:active { cursor: grabbing; }
.nodes g[data-node-id]:hover > rect:first-of-type {
  filter: brightness(1.08) drop-shadow(0 0 6px rgba(142,158,255,0.15));
  transition: filter 0.15s ease;
}

/* Zoom controls */
#controls {
  position: fixed; bottom: 16px; right: 16px;
  display: flex; align-items: center; gap: 2px;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(142,158,255,0.12);
  border-radius: 8px; padding: 4px; z-index: 10;
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: none; border-radius: 6px;
  background: transparent; color: #babac0;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.ctrl-btn:hover { background: rgba(142,158,255,0.08); color: #e8e8ee; }
#zoom-label {
  font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace;
  color: #767682; min-width: 36px; text-align: center;
}

/* Info panel */
@keyframes panelSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
#info-panel {
  position: fixed; bottom: 52px; left: 16px;
  max-width: 480px; min-width: 260px;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(142,158,255,0.12);
  border-radius: 8px; padding: 0;
  font-size: 13px; line-height: 1.5;
  z-index: 10; display: none;
  max-height: calc(100vh - 120px); overflow: hidden;
}
#info-panel.visible { display: block; animation: panelSlideIn 0.2s ease-out; }
#info-panel h3 {
  font-size: 14px; font-weight: 700; margin: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#info-panel .node-desc { color: #babac0; font-size: 12px; margin-bottom: 8px; font-style: italic; }
#info-panel .info-section { margin-bottom: 6px; }
#info-panel .info-label { font-size: 11px; font-weight: 600; color: #767682; text-transform: uppercase; letter-spacing: 0.5px; }
#info-panel .info-value { color: #babac0; }
#info-panel .port-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 2px; }
#info-panel .port-list li { padding: 2px 0; display: flex; align-items: center; gap: 6px; }
#info-panel .port-list li::before { content: '\2022'; color: #767682; flex-shrink: 0; }
#info-panel .port-type { color: #767682; font-size: 11px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
#info-panel pre {
  background: #161625; border: 1px solid #313143;
  border-radius: 6px; padding: 10px; overflow-x: auto;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px; line-height: 1.6; white-space: pre;
  max-height: 300px; overflow-y: auto; margin: 6px 0 0;
  color: #e6edf3;
}

/* Custom scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(142,158,255,0.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(142,158,255,0.45); }
::-webkit-scrollbar-corner { background: transparent; }
* { scrollbar-width: thin; scrollbar-color: rgba(142,158,255,0.25) transparent; }

/* Info panel header */
#info-header {
  display: flex; align-items: center; gap: 6px; padding: 12px 16px;
  border-bottom: 1px solid rgba(142,158,255,0.08);
}
#info-header h3 { flex: 1; margin-bottom: 0; }
#info-body { padding: 12px 16px; overflow-y: auto; max-height: calc(100vh - 180px); }
.panel-btn {
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border: none; border-radius: 4px;
  background: transparent; color: #767682;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.panel-btn:hover { background: #313143; color: #e8e8ee; }

/* Info panel fullscreen transitions */
#info-panel.fullscreen {
  left: 16px; bottom: 16px; top: 16px; right: 16px;
  max-width: none; min-width: 0; width: auto; max-height: none;
  border-radius: 12px;
}
#info-panel.fullscreen pre { max-height: none; }
.hl-kw { color: #8e9eff; }
.hl-str { color: #ff7b72; }
.hl-num { color: #f0a050; }
.hl-cm { color: #6a737d; font-style: italic; }
.hl-fn { color: #d2a8ff; }
.hl-ty { color: #d2a8ff; }
.hl-pn { color: #b8bdd0; }
.hl-ann { color: #8e9eff; font-weight: 600; font-style: normal; }
.hl-arr { color: #79c0ff; font-weight: 600; font-style: normal; }
.hl-id { color: #e6edf3; font-style: normal; }
.hl-sc { color: #d2a8ff; font-style: italic; }

/* Branding badge */
#branding {
  position: fixed; bottom: 16px; left: 16px;
  display: flex; align-items: center; gap: 6px;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(142,158,255,0.12);
  border-radius: 8px; padding: 6px 12px;
  font-size: 12px; font-weight: 600; color: #babac0;
  text-decoration: none; z-index: 9;
  transition: color 0.15s, border-color 0.15s;
}
#branding:hover { color: #e8e8ee; border-color: #767682; }

/* Scroll hint */
@keyframes hintFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
#scroll-hint {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(26,26,46,0.92);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(142,158,255,0.12);
  color: #e8e8ee;
  padding: 6px 14px; border-radius: 8px;
  font-size: 13px; pointer-events: none;
  z-index: 20; opacity: 0; transition: opacity 0.3s;
}
#scroll-hint.visible { opacity: 1; }
#scroll-hint kbd {
  display: inline-block; padding: 1px 5px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px; font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px; background: rgba(255,255,255,0.06);
}

/* Studio nudge toast */
#studio-hint {
  position: fixed; bottom: 60px; left: 50%;
  transform: translateX(-50%);
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(142,158,255,0.12);
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; color: #babac0;
  z-index: 20; opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
#studio-hint.visible { opacity: 1; pointer-events: auto; }
#studio-hint a { color: #8e9eff; text-decoration: none; font-weight: 600; }
#studio-hint a:hover { text-decoration: underline; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .node-glow { animation: none; opacity: 0.35; stroke-width: 8; }
  #info-panel { animation: none; }
  * { transition-duration: 0s !important; }
}

/* Responsive: mobile */
@media (max-width: 768px) {
  #controls { bottom: 12px; right: 12px; padding: 3px; }
  .ctrl-btn { width: 24px; height: 24px; font-size: 14px; }
  #zoom-label { font-size: 10px; min-width: 30px; }
  #branding { bottom: 12px; left: 12px; padding: 4px 8px; font-size: 11px; }
  #studio-hint { max-width: 90vw; text-align: center; white-space: normal; }
  #info-panel {
    left: 0 !important; right: 0 !important; bottom: 0 !important;
    max-width: none; min-width: 0; width: 100%;
    border-radius: 12px 12px 0 0;
    max-height: 60vh;
  }
  #info-panel::before {
    content: ''; display: block; width: 32px; height: 4px;
    background: rgba(142,158,255,0.3);
    border-radius: 2px; margin: 8px auto 4px;
  }
  #info-body { max-height: calc(60vh - 80px); }
}
</style>

<script>var nodeSources = {"cfg":{"description":"Read .weaver.json, merge with defaults, and output the config object.","source":"/**\n * Read .weaver.json, merge with defaults, and output the config object.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Load Config\n * @input [projectDir] [order:0] - Project root directory (defaults to cwd)\n * @output projectDir [order:0] - Project root directory (pass-through)\n * @output config [order:1] - Weaver configuration\n * @output onFailure [hidden]\n */\nexport function weaverLoadConfig(projectDir?: string): { projectDir: string; config: WeaverConfig } {\n  const dir = projectDir || process.cwd();\n  const configPath = path.join(dir, '.weaver.json');\n  let config: WeaverConfig = { provider: 'auto' };\n  if (fs.existsSync(configPath)) {\n    config = { ...config, ...JSON.parse(fs.readFileSync(configPath, 'utf-8')) };\n    console.log(`\\x1b[36m→ Loaded config from ${configPath}\\x1b[0m`);\n  } else {\n    console.log('\\x1b[36m→ No .weaver.json found, using defaults (provider: auto)\\x1b[0m');\n  }\n  return { projectDir: dir, config };\n}","ports":{"projectDir":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"config":{"type":"OBJECT","tsType":"BotConfig"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"detect":{"description":"Auto-detect or resolve the configured AI provider.\nAssembles the WeaverEnv bundle from projectDir, config, and detected provider.","source":"/**\n * Auto-detect or resolve the configured AI provider.\n * Assembles the WeaverEnv bundle from projectDir, config, and detected provider.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Detect Provider\n * @input projectDir [order:0] - Project root directory\n * @input config [order:1] - Weaver configuration\n * @output env [order:0] - Weaver environment bundle\n * @output onFailure [hidden]\n */\nexport function weaverDetectProvider(projectDir: string, config: WeaverConfig): {\n  env: WeaverEnv;\n} {\n  const providerSetting = config.provider ?? 'auto';\n\n  let type: string;\n  let model: string | undefined;\n  let maxTokens: number | undefined;\n\n  if (typeof providerSetting === 'object') {\n    type = providerSetting.name;\n    model = providerSetting.model;\n    maxTokens = providerSetting.maxTokens;\n  } else if (providerSetting !== 'auto') {\n    type = providerSetting;\n  } else {\n    if (process.env.ANTHROPIC_API_KEY) {\n      type = 'anthropic';\n    } else if (whichSafe('claude', projectDir)) {\n      type = 'claude-cli';\n    } else if (whichSafe('copilot', projectDir)) {\n      type = 'copilot-cli';\n    } else {\n      throw new Error(\n        'No AI provider found. Options:\\n' +\n        '  1. Set ANTHROPIC_API_KEY environment variable\\n' +\n        '  2. Install Claude CLI: https://docs.anthropic.com/claude-code\\n' +\n        '  3. Install GitHub Copilot CLI: https://github.com/features/copilot',\n      );\n    }\n  }\n\n  const providerInfo: ProviderInfo = {\n    type: type as ProviderInfo['type'],\n    model: model ?? (type === 'anthropic' ? 'claude-sonnet-4-6' : undefined),\n    maxTokens: maxTokens ?? (type === 'anthropic' ? 4096 : undefined),\n    apiKey: type === 'anthropic' ? process.env.ANTHROPIC_API_KEY : undefined,\n  };\n\n  if (type === 'anthropic' && !providerInfo.apiKey) {\n    throw new Error('Provider is \"anthropic\" but ANTHROPIC_API_KEY is not set');\n  }\n\n  const label = providerInfo.model ? `${type} (${providerInfo.model})` : type;\n  console.log(`\\x1b[36m→ Provider: ${label}\\x1b[0m`);\n\n  return {\n    env: { projectDir, config, providerType: type, providerInfo },\n  };\n}","ports":{"projectDir":{"type":"STRING","tsType":"string"},"config":{"type":"OBJECT","tsType":"import(\"/Users/ricardomorais/github/synergenius-fw/flowweaver-pack-weaver/src/bot/types\").BotConfig"},"execute":{"type":"STEP"},"env":{"type":"OBJECT","tsType":"WeaverEnv"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"gCfg":{"description":"Loads genesis configuration from the project .genesis directory,\nvalidates the target workflow exists, and generates a new cycle ID.\nCreates the initial GenesisContext that threads through the pipeline.","source":"/**\n * Loads genesis configuration from the project .genesis directory,\n * validates the target workflow exists, and generates a new cycle ID.\n * Creates the initial GenesisContext that threads through the pipeline.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Load Config\n * @input env [order:0] - Weaver environment bundle\n * @output ctx [order:0] - Genesis context (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisLoadConfig(env: WeaverEnv): {\n  ctx: string;\n} {\n  const store = new GenesisStore(env.projectDir);\n  const config = store.loadConfig();\n\n  if (!config.targetWorkflow) {\n    throw new Error('Genesis config has no targetWorkflow set. Run \"weaver genesis --init\" and set it in .genesis/config.json');\n  }\n\n  const targetPath = path.resolve(env.projectDir, config.targetWorkflow);\n  if (!fs.existsSync(targetPath) || !fs.statSync(targetPath).isFile()) {\n    throw new Error(`Target workflow not found: ${targetPath}`);\n  }\n\n  const cycleId = GenesisStore.newCycleId();\n  console.log(`\\x1b[36m→ Genesis config loaded, cycle ${cycleId}\\x1b[0m`);\n\n  const ctx: GenesisContext = {\n    env,\n    genesisConfigJson: JSON.stringify(config),\n    cycleId,\n    startTimeMs: Date.now(),\n  };\n\n  return { ctx: JSON.stringify(ctx) };\n}","ports":{"env":{"type":"OBJECT","tsType":"WeaverEnv"},"execute":{"type":"STEP"},"ctx":{"type":"STRING","tsType":"string"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"escRecover":{"description":"Checks for interrupted escrow migrations (crash recovery) and sets\ngrace-period context flags for downstream nodes. Runs early in the\nworkflow so propose and other nodes can see the escrow state.","source":"/**\n * Checks for interrupted escrow migrations (crash recovery) and sets\n * grace-period context flags for downstream nodes. Runs early in the\n * workflow so propose and other nodes can see the escrow state.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Escrow Recover\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with escrow state flags (JSON)\n */\nexport function genesisEscrowRecover(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n\n  if (!config.selfEvolve) {\n    context.escrowGraceLocked = false;\n    return { ctx: JSON.stringify(context) };\n  }\n\n  const store = new GenesisStore(env.projectDir);\n  const token = store.loadEscrowToken();\n\n  if (!token) {\n    context.escrowGraceLocked = false;\n    return { ctx: JSON.stringify(context) };\n  }\n\n  const packRoot = path.resolve(path.dirname(new URL(import.meta.url).pathname), '..', '..');\n\n  // Crash recovery: process died mid-swap\n  if (token.phase === 'migrating') {\n    console.log('\\x1b[33m→ Detected interrupted migration, checking file integrity...\\x1b[0m');\n\n    let needsRollback = false;\n    for (const relFile of token.affectedFiles) {\n      const absFile = path.resolve(packRoot, relFile);\n      if (!fs.existsSync(absFile)) {\n        needsRollback = true;\n        break;\n      }\n      const currentHash = GenesisStore.hashFile(absFile);\n      const stagedHash = token.stagedFileHashes[relFile];\n      const backupHash = token.backupFileHashes[relFile];\n      if (currentHash !== stagedHash && currentHash !== backupHash) {\n        needsRollback = true;\n        break;\n      }\n    }\n\n    if (needsRollback) {\n      console.log('\\x1b[33m→ Inconsistent state, rolling back...\\x1b[0m');\n      rollbackFromBackup(store, token, packRoot, 'Crash recovery: inconsistent file state');\n    } else {\n      // Check if all files match staged (migration was actually complete)\n      const allStaged = token.affectedFiles.every(f => {\n        const absFile = path.resolve(packRoot, f);\n        return fs.existsSync(absFile) && GenesisStore.hashFile(absFile) === token.stagedFileHashes[f];\n      });\n      if (allStaged) {\n        token.phase = 'migrated';\n        token.migratedAt = new Date().toISOString();\n        store.saveEscrowToken(token);\n        console.log('\\x1b[32m→ Migration was complete, advancing to grace period\\x1b[0m');\n      } else {\n        rollbackFromBackup(store, token, packRoot, 'Crash recovery: partial migration');\n      }\n    }\n  }\n\n  // Set grace state for downstream nodes\n  const current = store.loadEscrowToken();\n  if (current && current.phase === 'migrated' && current.graceRemaining > 0) {\n    context.escrowGraceLocked = true;\n    context.escrowGraceRemaining = current.graceRemaining;\n  } else {\n    context.escrowGraceLocked = false;\n  }\n\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"observe":{"description":"Fingerprints the project state: hashes .ts files, reads package.json,\ncaptures git branch/commit, scans for workflow files, and hashes the\ntarget workflow content.","source":"/**\n * Fingerprints the project state: hashes .ts files, reads package.json,\n * captures git branch/commit, scans for workflow files, and hashes the\n * target workflow content.\n *\n * @flowWeaver nodeType\n * @label Genesis Observe\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with fingerprintJson (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisObserve(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson);\n\n  if (!execute) {\n    const empty: GenesisFingerprint = {\n      timestamp: new Date().toISOString(),\n      files: {},\n      packageJson: null,\n      gitBranch: null,\n      gitCommit: null,\n      workflowHash: '',\n      existingWorkflows: [],\n    };\n    context.fingerprintJson = JSON.stringify(empty);\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const projectDir = env.projectDir;\n\n  try {\n    const files: Record<string, string> = {};\n    const dirsToScan = [projectDir];\n    const srcDir = path.join(projectDir, 'src');\n    if (fs.existsSync(srcDir) && fs.statSync(srcDir).isDirectory()) dirsToScan.push(srcDir);\n\n    for (const dir of dirsToScan) {\n      const entries = fs.readdirSync(dir, { withFileTypes: true });\n      for (const entry of entries) {\n        if (entry.isFile() && entry.name.endsWith('.ts')) {\n          const filePath = path.join(dir, entry.name);\n          const relPath = path.relative(projectDir, filePath);\n          const content = fs.readFileSync(filePath, 'utf-8');\n          files[relPath] = crypto.createHash('sha256').update(content).digest('hex');\n        }\n      }\n    }\n\n    let packageJson: Record<string, unknown> | null = null;\n    const pkgPath = path.join(projectDir, 'package.json');\n    if (fs.existsSync(pkgPath)) {\n      packageJson = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));\n    }\n\n    let gitBranch: string | null = null;\n    let gitCommit: string | null = null;\n    try {\n      gitBranch = execFileSync('git', ['rev-parse', '--abbrev-ref', 'HEAD'], {\n        cwd: projectDir, encoding: 'utf-8', stdio: ['pipe', 'pipe', 'pipe'],\n      }).trim();\n      gitCommit = execFileSync('git', ['rev-parse', 'HEAD'], {\n        cwd: projectDir, encoding: 'utf-8', stdio: ['pipe', 'pipe', 'pipe'],\n      }).trim();\n    } catch {\n      // Not a git repo or git unavailable\n    }\n\n    const existingWorkflows: string[] = [];\n    for (const [relPath, _hash] of Object.entries(files)) {\n      const filePath = path.join(projectDir, relPath);\n      const content = fs.readFileSync(filePath, 'utf-8');\n      if (content.includes('@flowWeaver workflow')) {\n        existingWorkflows.push(relPath);\n      }\n    }\n\n    const targetPath = path.resolve(projectDir, config.targetWorkflow);\n    const targetContent = fs.readFileSync(targetPath, 'utf-8');\n    const workflowHash = crypto.createHash('sha256').update(targetContent).digest('hex');\n\n    const fingerprint: GenesisFingerprint = {\n      timestamp: new Date().toISOString(),\n      files,\n      packageJson,\n      gitBranch,\n      gitCommit,\n      workflowHash,\n      existingWorkflows,\n    };\n\n    console.log(`\\x1b[36m→ Fingerprint: ${Object.keys(files).length} files, ${existingWorkflows.length} workflows\\x1b[0m`);\n\n    context.fingerprintJson = JSON.stringify(fingerprint);\n    context.workflowDescription = await getWorkflowDescription(targetPath);\n\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Observe failed: ${msg}\\x1b[0m`);\n    context.fingerprintJson = '{}';\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"diffFp":{"description":"Compares the current project fingerprint against the last saved one,\nproducing a diff summary of file and state changes.","source":"/**\n * Compares the current project fingerprint against the last saved one,\n * producing a diff summary of file and state changes.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Diff Fingerprint\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with diffJson (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisDiffFingerprint(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const store = new GenesisStore(env.projectDir);\n  const current = JSON.parse(context.fingerprintJson!) as GenesisFingerprint;\n  const last = store.getLastFingerprint();\n\n  const addedFiles: string[] = [];\n  const removedFiles: string[] = [];\n  const modifiedFiles: string[] = [];\n  let gitChanged = false;\n  let workflowsChanged = false;\n\n  if (!last) {\n    const diff = {\n      addedFiles: Object.keys(current.files),\n      removedFiles: [],\n      modifiedFiles: [],\n      gitChanged: true,\n      workflowsChanged: true,\n    };\n    context.diffJson = JSON.stringify(diff);\n    return { ctx: JSON.stringify(context) };\n  }\n\n  for (const [file, hash] of Object.entries(current.files)) {\n    if (!(file in last.files)) {\n      addedFiles.push(file);\n    } else if (last.files[file] !== hash) {\n      modifiedFiles.push(file);\n    }\n  }\n  for (const file of Object.keys(last.files)) {\n    if (!(file in current.files)) {\n      removedFiles.push(file);\n    }\n  }\n\n  gitChanged = current.gitBranch !== last.gitBranch || current.gitCommit !== last.gitCommit;\n\n  const currentWfs = [...current.existingWorkflows].sort().join(',');\n  const lastWfs = [...last.existingWorkflows].sort().join(',');\n  workflowsChanged = currentWfs !== lastWfs || current.workflowHash !== last.workflowHash;\n\n  const diff = { addedFiles, removedFiles, modifiedFiles, gitChanged, workflowsChanged };\n  const hasChanges = addedFiles.length > 0 || removedFiles.length > 0 ||\n    modifiedFiles.length > 0 || gitChanged || workflowsChanged;\n\n  console.log(`\\x1b[36m→ Diff: +${addedFiles.length} -${removedFiles.length} ~${modifiedFiles.length}, git=${gitChanged}, wf=${workflowsChanged}\\x1b[0m`);\n\n  context.diffJson = JSON.stringify(diff);\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"stabilize":{"description":"Determines whether genesis should enter stabilize mode. This happens\nwhen the config flag is set or when the last 3 cycles were all\nrollbacks or rejections.","source":"/**\n * Determines whether genesis should enter stabilize mode. This happens\n * when the config flag is set or when the last 3 cycles were all\n * rollbacks or rejections.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Check Stabilize\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with stabilized (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisCheckStabilize(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n\n  if (config.stabilize) {\n    console.log('\\x1b[33m→ Stabilize mode: enabled by config\\x1b[0m');\n    context.stabilized = true;\n    return { ctx: JSON.stringify(context) };\n  }\n\n  const store = new GenesisStore(context.env.projectDir);\n  const recent = store.getRecentOutcomes(3);\n\n  if (recent.length >= 3 && recent.every(o => o === 'rolled-back' || o === 'rejected')) {\n    console.log('\\x1b[33m→ Stabilize mode: 3+ consecutive rollbacks/rejections\\x1b[0m');\n    context.stabilized = true;\n    return { ctx: JSON.stringify(context) };\n  }\n\n  context.stabilized = false;\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"propose":{"description":"Sends project context and diff information to the AI provider, which\nreturns a structured proposal of workflow operations to apply.","source":"/**\n * Sends project context and diff information to the AI provider, which\n * returns a structured proposal of workflow operations to apply.\n *\n * @flowWeaver nodeType\n * @label Genesis Propose\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with proposalJson (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisPropose(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n\n  if (!execute) {\n    const empty: GenesisProposal = { operations: [], totalCost: 0, impactLevel: 'COSMETIC', summary: 'dry run', rationale: '' };\n    context.proposalJson = JSON.stringify(empty);\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const { providerInfo: pInfo } = env;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const diff = JSON.parse(context.diffJson!);\n  const targetPath = path.resolve(env.projectDir, config.targetWorkflow);\n\n  const systemPrompt = await getGenesisSystemPrompt(config, !!context.stabilized, {\n    selfEvolveLocked: !!context.escrowGraceLocked,\n    graceRemaining: context.escrowGraceRemaining ?? 0,\n  });\n\n  const userPrompt = [\n    '## Current Workflow Structure',\n    context.workflowDescription || '(no description available)',\n    '',\n    '## Project Diff Since Last Cycle',\n    JSON.stringify(diff, null, 2),\n    '',\n    '## Current Fingerprint',\n    context.fingerprintJson!,\n    '',\n    getOperationExamples(targetPath),\n    '',\n    'Propose workflow evolution operations within the budget. Use node IDs and port names that exist in the workflow structure above.',\n  ].join('\\n');\n\n  const maxAttempts = 2;\n  let lastError = '';\n\n  for (let attempt = 1; attempt <= maxAttempts; attempt++) {\n    try {\n      let text: string;\n      if (pInfo.type === 'anthropic') {\n        text = await callApi(\n          pInfo.apiKey!,\n          pInfo.model ?? 'claude-sonnet-4-6',\n          pInfo.maxTokens ?? 8192,\n          systemPrompt,\n          userPrompt,\n        );\n      } else {\n        text = callCli(pInfo.type, systemPrompt + '\\n\\n' + userPrompt, pInfo.model);\n      }\n\n      const proposal = parseJsonResponse(text) as unknown as GenesisProposal;\n      console.log(`\\x1b[36m→ Proposal: ${proposal.summary} (${proposal.operations.length} ops, impact=${proposal.impactLevel})\\x1b[0m`);\n\n      context.proposalJson = JSON.stringify(proposal);\n      return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n    } catch (err: unknown) {\n      lastError = err instanceof Error ? err.message : String(err);\n      const isTransient = /ETIMEDOUT|ECONNRESET|ECONNREFUSED|EPIPE|socket hang up/i.test(lastError);\n\n      if (isTransient && attempt < maxAttempts) {\n        console.log(`\\x1b[33m→ Proposal attempt ${attempt} failed (transient): ${lastError.slice(0, 100)}. Retrying...\\x1b[0m`);\n        continue;\n      }\n\n      console.error(`\\x1b[31m→ Proposal failed: ${lastError}\\x1b[0m`);\n    }\n  }\n\n  context.error = `Proposal failed: ${lastError}`;\n  context.proposalJson = JSON.stringify({ operations: [], totalCost: 0, impactLevel: 'COSMETIC', summary: `Failed: ${lastError}`, rationale: '' });\n  return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"validate":{"description":"Validates and trims a genesis proposal to fit within the budget.\nRecalculates costs (never trusts the AI), filters out disallowed\noperations in stabilize mode, and trims from the end if over budget.","source":"/**\n * Validates and trims a genesis proposal to fit within the budget.\n * Recalculates costs (never trusts the AI), filters out disallowed\n * operations in stabilize mode, and trims from the end if over budget.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Validate Proposal\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with validated proposalJson (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisValidateProposal(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const proposal = JSON.parse(context.proposalJson!) as GenesisProposal;\n\n  let ops = proposal.operations;\n\n  // In stabilize mode, hard-reject addNode and addConnection\n  if (context.stabilized) {\n    const before = ops.length;\n    ops = ops.filter(op => op.type !== 'addNode' && op.type !== 'addConnection');\n    if (ops.length < before) {\n      console.log(`\\x1b[33m→ Stabilize: filtered ${before - ops.length} disallowed operations\\x1b[0m`);\n    }\n  }\n\n  // Filter self-modify ops if selfEvolve is disabled\n  if (!config.selfEvolve) {\n    const before = ops.length;\n    ops = ops.filter(op => !SELF_MODIFY_TYPES.has(op.type));\n    if (ops.length < before) {\n      console.log(`\\x1b[33m→ Self-evolve disabled: filtered ${before - ops.length} self-modify operations\\x1b[0m`);\n    }\n  }\n\n  // Validate self-modify ops have required args\n  ops = ops.filter(op => {\n    if (SELF_MODIFY_TYPES.has(op.type)) {\n      if (!op.args.file || !op.args.content) {\n        console.log(`\\x1b[33m→ Filtered ${op.type}: missing file or content\\x1b[0m`);\n        return false;\n      }\n    }\n    return true;\n  });\n\n  // Recalculate costs (never trust the AI values)\n  for (const op of ops) {\n    op.costUnits = COST_MAP[op.type] ?? 1;\n  }\n\n  // Split into regular and self-modify ops for separate budget enforcement\n  const regularOps = ops.filter(op => !SELF_MODIFY_TYPES.has(op.type));\n  let selfOps = ops.filter(op => SELF_MODIFY_TYPES.has(op.type));\n\n  // Trim regular ops to regular budget\n  let regularCost = regularOps.reduce((sum, op) => sum + op.costUnits, 0);\n  while (regularCost > config.budgetPerCycle && regularOps.length > 0) {\n    regularOps.pop();\n    regularCost = regularOps.reduce((sum, op) => sum + op.costUnits, 0);\n  }\n\n  // Trim self-modify ops to self-evolve budget\n  const selfBudget = config.selfEvolveBudget ?? 2;\n  let selfCost = selfOps.reduce((sum, op) => sum + op.costUnits, 0);\n  while (selfCost > selfBudget && selfOps.length > 0) {\n    selfOps.pop();\n    selfCost = selfOps.reduce((sum, op) => sum + op.costUnits, 0);\n  }\n\n  ops = [...regularOps, ...selfOps];\n  let totalCost = regularCost + selfCost;\n\n  const validated: GenesisProposal = {\n    ...proposal,\n    operations: ops,\n    totalCost,\n  };\n\n  console.log(`\\x1b[36m→ Validated proposal: ${ops.length} ops, cost=${totalCost}/${config.budgetPerCycle}\\x1b[0m`);\n\n  context.proposalJson = JSON.stringify(validated);\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"snapshot":{"description":"Saves a snapshot of the target workflow file before any modifications\nare applied, enabling rollback if something goes wrong.","source":"/**\n * Saves a snapshot of the target workflow file before any modifications\n * are applied, enabling rollback if something goes wrong.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Snapshot\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with snapshotPath (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisSnapshot(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const targetPath = path.resolve(context.env.projectDir, config.targetWorkflow);\n  const content = fs.readFileSync(targetPath, 'utf-8');\n\n  const store = new GenesisStore(context.env.projectDir);\n  const snapshotPath = store.saveSnapshot(context.cycleId, content);\n\n  console.log(`\\x1b[36m→ Snapshot saved: ${snapshotPath}\\x1b[0m`);\n\n  context.snapshotPath = snapshotPath;\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"applyRetry":{"description":"Scoped retry loop for apply + compile. Delegates the actual work to\na child node via the attempt callback, and between failures restores\nthe snapshot and asks the AI to revise the proposal.","source":"/**\n * Scoped retry loop for apply + compile. Delegates the actual work to\n * a child node via the attempt callback, and between failures restores\n * the snapshot and asks the AI to revise the proposal.\n *\n * @flowWeaver nodeType\n * @label Genesis Apply Retry\n * @input ctx [order:0] - Genesis context (JSON)\n * @output start scope:attempt [order:10] [hidden] - Trigger scope execution (boolean)\n * @output attemptCtx scope:attempt [order:11] - Context for child (JSON)\n * @input success scope:attempt [order:12] [hidden] - Success signal from child (boolean)\n * @input failure scope:attempt [order:13] [hidden] - Failure signal from child (boolean)\n * @input attemptCtx scope:attempt [order:14] - Result context from child (JSON)\n * @output ctx [order:0] - Genesis context with applyResultJson (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] - On Failure\n */\nexport async function genesisApplyRetry(\n  execute: boolean,\n  ctx: string,\n  attempt: (\n    start: boolean,\n    attemptCtx: string,\n  ) => Promise<{ success: boolean; failure: boolean; attemptCtx: string }>,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n\n  if (!execute) {\n    const result = { applied: 0, failed: 0, errors: [] as string[] };\n    context.applyResultJson = JSON.stringify(result);\n    context.error = '';\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const { env } = context;\n  const maxAttempts = 3;\n  let lastResult = '';\n  let lastErrors = '';\n\n  for (let i = 1; i <= maxAttempts; i++) {\n    console.log(`\\x1b[36m→ Apply attempt ${i}/${maxAttempts}\\x1b[0m`);\n\n    const outcome = await attempt(true, JSON.stringify(context));\n    const childCtx = JSON.parse(outcome.attemptCtx) as GenesisContext;\n    lastResult = childCtx.applyResultJson ?? '';\n    lastErrors = childCtx.error ?? '';\n\n    if (outcome.success) {\n      context.applyResultJson = childCtx.applyResultJson;\n      context.error = '';\n      return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n    }\n\n    if (i < maxAttempts) {\n      console.log('\\x1b[33m→ Requesting revised proposal from AI...\\x1b[0m');\n\n      const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n      const targetPath = path.resolve(env.projectDir, config.targetWorkflow);\n      const store = new GenesisStore(env.projectDir);\n      const snapshot = store.loadSnapshot(context.snapshotPath!);\n      if (snapshot) {\n        fs.writeFileSync(targetPath, snapshot, 'utf-8');\n      }\n\n      try {\n        const revisedProposal = await reviseProposal(\n          env, config, context.proposalJson!, lastErrors,\n          targetPath, context.workflowDescription, !!context.stabilized,\n        );\n        context.proposalJson = revisedProposal;\n        console.log('\\x1b[36m→ Revised proposal received\\x1b[0m');\n      } catch (err: unknown) {\n        const msg = err instanceof Error ? err.message : String(err);\n        console.error(`\\x1b[31m→ AI revision failed: ${msg}\\x1b[0m`);\n        break;\n      }\n    }\n  }\n\n  const errorDesc = lastErrors\n    ? `Apply/compile failed after ${maxAttempts} attempts. Last errors: ${lastErrors}`\n    : `Apply failed after ${maxAttempts} attempts (all operations failed)`;\n\n  context.applyResultJson = lastResult;\n  context.error = errorDesc;\n  return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"ANY"},"success":{"type":"STEP"},"failure":{"type":"STEP"},"attemptCtx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"start":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"tryApply":{"description":"Applies proposal operations then validates + compiles. On compile\nfailure, restores the snapshot and returns the failure path with\nerror details so the parent scope can retry with a revised proposal.","source":"/**\n * Applies proposal operations then validates + compiles. On compile\n * failure, restores the snapshot and returns the failure path with\n * error details so the parent scope can retry with a revised proposal.\n *\n * @flowWeaver nodeType\n * @label Genesis Try Apply\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with apply results (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisTryApply(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n\n  if (!execute) {\n    const result = { applied: 0, failed: 0, errors: [] };\n    context.applyResultJson = JSON.stringify(result);\n    context.error = '';\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const proposal = JSON.parse(context.proposalJson!) as GenesisProposal;\n  const targetPath = path.resolve(env.projectDir, config.targetWorkflow);\n\n  // Apply operations\n  let applied = 0;\n  let failed = 0;\n  const errors: string[] = [];\n\n  for (const op of proposal.operations) {\n    const validationError = validateOperationArgs(op);\n    if (validationError) {\n      failed++;\n      errors.push(validationError);\n      console.error(`\\x1b[31m  x ${op.type} (pre-validation): ${validationError}\\x1b[0m`);\n      continue;\n    }\n\n    try {\n      const cliArgs = buildModifyArgs(op, targetPath);\n      execFileSync('flow-weaver', cliArgs, {\n        cwd: env.projectDir,\n        encoding: 'utf-8',\n        stdio: ['pipe', 'pipe', 'pipe'],\n        timeout: 30_000,\n      });\n      applied++;\n      console.log(`\\x1b[32m  + ${op.type}: ${op.rationale}\\x1b[0m`);\n    } catch (err: unknown) {\n      failed++;\n      const msg = err instanceof Error ? err.message : String(err);\n      errors.push(`${op.type}: ${msg}`);\n      console.error(`\\x1b[31m  x ${op.type}: ${msg}\\x1b[0m`);\n    }\n  }\n\n  const applyResult = { applied, failed, errors };\n  context.applyResultJson = JSON.stringify(applyResult);\n\n  console.log(`\\x1b[36m→ Apply: ${applied} succeeded, ${failed} failed\\x1b[0m`);\n\n  // If all operations failed, no point compiling\n  if (applied === 0) {\n    context.error = '';\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n\n  // Validate + compile\n  try {\n    execFileSync('flow-weaver', ['validate', targetPath], {\n      cwd: env.projectDir,\n      encoding: 'utf-8',\n      stdio: ['pipe', 'pipe', 'pipe'],\n      timeout: 30_000,\n    });\n    console.log('\\x1b[32m→ Validation passed\\x1b[0m');\n\n    execFileSync('flow-weaver', ['compile', targetPath], {\n      cwd: env.projectDir,\n      encoding: 'utf-8',\n      stdio: ['pipe', 'pipe', 'pipe'],\n      timeout: 60_000,\n    });\n    console.log('\\x1b[32m→ Compilation passed\\x1b[0m');\n\n    context.error = '';\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Compile/validate failed: ${msg}\\x1b[0m`);\n\n    // Restore from snapshot\n    const store = new GenesisStore(env.projectDir);\n    const snapshot = store.loadSnapshot(context.snapshotPath!);\n    if (snapshot) {\n      fs.writeFileSync(targetPath, snapshot, 'utf-8');\n      console.log('\\x1b[33m→ Restored from snapshot\\x1b[0m');\n    }\n\n    context.error = msg;\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"diffWf":{"description":"Runs flow-weaver diff between the snapshot and the current target\nworkflow to produce a human-readable diff of workflow changes.","source":"/**\n * Runs flow-weaver diff between the snapshot and the current target\n * workflow to produce a human-readable diff of workflow changes.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Diff Workflow\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with workflowDiffJson (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisDiffWorkflow(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const targetPath = path.resolve(context.env.projectDir, config.targetWorkflow);\n\n  let diffOutput = '';\n\n  // Try semantic diff via flow-weaver first\n  try {\n    diffOutput = execFileSync('flow-weaver', ['diff', context.snapshotPath!, targetPath], {\n      cwd: context.env.projectDir,\n      encoding: 'utf-8',\n      stdio: ['pipe', 'pipe', 'pipe'],\n      timeout: 30_000,\n    }).trim();\n  } catch (err: unknown) {\n    if (err && typeof err === 'object' && 'stdout' in err) {\n      diffOutput = String((err as { stdout: string }).stdout).trim();\n    }\n  }\n\n  // Fallback to basic text diff if semantic diff failed\n  if (!diffOutput && context.snapshotPath) {\n    try {\n      const snapshotContent = fs.readFileSync(context.snapshotPath, 'utf-8');\n      const currentContent = fs.readFileSync(targetPath, 'utf-8');\n\n      if (snapshotContent === currentContent) {\n        diffOutput = '(no changes)';\n      } else {\n        diffOutput = execFileSync('git', ['diff', '--no-index', '--no-color', context.snapshotPath, targetPath], {\n          cwd: context.env.projectDir,\n          encoding: 'utf-8',\n          stdio: ['pipe', 'pipe', 'pipe'],\n          timeout: 10_000,\n        }).trim();\n      }\n    } catch (err: unknown) {\n      // git diff exits 1 when files differ (that's normal)\n      if (err && typeof err === 'object' && 'stdout' in err) {\n        const stdout = String((err as { stdout: string }).stdout).trim();\n        if (stdout) diffOutput = stdout;\n      }\n    }\n  }\n\n  if (!diffOutput) {\n    diffOutput = '(diff unavailable)';\n  }\n\n  console.log(`\\x1b[36m→ Workflow diff: ${diffOutput.split('\\n').length} lines\\x1b[0m`);\n\n  context.workflowDiffJson = JSON.stringify({ diff: diffOutput });\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"threshold":{"description":"Compares the proposal's impact level against the configured approval\nthreshold to decide if human approval is required.","source":"/**\n * Compares the proposal's impact level against the configured approval\n * threshold to decide if human approval is required.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Check Threshold\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with approvalRequired (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisCheckThreshold(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const proposal = JSON.parse(context.proposalJson!) as GenesisProposal;\n\n  const proposalLevel = IMPACT_ORDER[proposal.impactLevel] ?? 0;\n  const thresholdLevel = IMPACT_ORDER[config.approvalThreshold] ?? 0;\n  const approvalRequired = proposalLevel >= thresholdLevel;\n\n  console.log(`\\x1b[36m→ Impact ${proposal.impactLevel} vs threshold ${config.approvalThreshold}: approval ${approvalRequired ? 'required' : 'not required'}\\x1b[0m`);\n\n  context.approvalRequired = approvalRequired;\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"approve":{"description":"Handles approval for genesis proposals. Auto-approves when approval\nis not required or when config approval mode is 'auto'. Otherwise\ndisplays the proposal summary and diff, then rejects (non-interactive\nenvironments cannot prompt).","source":"/**\n * Handles approval for genesis proposals. Auto-approves when approval\n * is not required or when config approval mode is 'auto'. Otherwise\n * displays the proposal summary and diff, then rejects (non-interactive\n * environments cannot prompt).\n *\n * @flowWeaver nodeType\n * @label Genesis Approve\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with approved (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisApprove(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n\n  if (!execute) {\n    context.approved = true;\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  // Auto-approve when approval is not required\n  if (!context.approvalRequired) {\n    console.log('\\x1b[32m→ Auto-approved (below threshold)\\x1b[0m');\n    context.approved = true;\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const { config } = context.env;\n  // Match the same default as runner.ts resolveApproval: no approval field = 'auto'\n  const approvalMode = !config.approval || config.approval === 'auto'\n    ? 'auto'\n    : typeof config.approval === 'string'\n      ? config.approval\n      : config.approval.mode;\n\n  // Display proposal summary\n  const proposal = JSON.parse(context.proposalJson!) as GenesisProposal;\n  const diffData = JSON.parse(context.workflowDiffJson!) as { diff: string };\n\n  console.log('\\n\\x1b[1m┌─ Genesis Proposal ─────────────────────┐\\x1b[0m');\n  console.log(`\\x1b[1m│\\x1b[0m Impact: ${proposal.impactLevel}`);\n  console.log(`\\x1b[1m│\\x1b[0m Summary: ${proposal.summary}`);\n  console.log(`\\x1b[1m│\\x1b[0m Operations: ${proposal.operations.length} (cost: ${proposal.totalCost})`);\n  for (const op of proposal.operations) {\n    console.log(`\\x1b[1m│\\x1b[0m  ${op.type}: ${op.rationale}`);\n  }\n  console.log('\\x1b[1m├─ Diff ─────────────────────────────────┤\\x1b[0m');\n  for (const line of diffData.diff.split('\\n').slice(0, 20)) {\n    console.log(`\\x1b[1m│\\x1b[0m ${line}`);\n  }\n  console.log('\\x1b[1m└────────────────────────────────────────┘\\x1b[0m\\n');\n\n  // Auto mode approves automatically\n  if (approvalMode === 'auto') {\n    console.log('\\x1b[32m→ Auto-approved (approval mode: auto)\\x1b[0m');\n    context.approved = true;\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  // Non-auto modes reject in non-interactive context\n  console.log('\\x1b[33m→ Rejected (approval required, non-auto mode)\\x1b[0m');\n  context.approved = false;\n  return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"commit":{"description":"Commits the modified workflow to git if approved, or restores from\nthe snapshot if rejected. Commit messages are prefixed with \"genesis:\".","source":"/**\n * Commits the modified workflow to git if approved, or restores from\n * the snapshot if rejected. Commit messages are prefixed with \"genesis:\".\n *\n * @flowWeaver nodeType\n * @label Genesis Commit\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with commitResultJson (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisCommit(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n\n  if (!execute) {\n    context.commitResultJson = JSON.stringify({ committed: false, reason: 'dry run' });\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const targetPath = path.resolve(env.projectDir, config.targetWorkflow);\n\n  if (!context.approved) {\n    // Restore from snapshot\n    const store = new GenesisStore(env.projectDir);\n    const snapshot = store.loadSnapshot(context.snapshotPath!);\n    if (snapshot) {\n      fs.writeFileSync(targetPath, snapshot, 'utf-8');\n      console.log('\\x1b[33m→ Restored from snapshot (not approved)\\x1b[0m');\n    }\n    context.commitResultJson = JSON.stringify({ committed: false, reason: 'not approved' });\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n\n  try {\n    execFileSync('git', ['add', targetPath], {\n      cwd: env.projectDir,\n      encoding: 'utf-8',\n      stdio: ['pipe', 'pipe', 'pipe'],\n    });\n\n    const message = `genesis: evolve ${path.basename(config.targetWorkflow)}`;\n    execFileSync('git', ['commit', '-m', message], {\n      cwd: env.projectDir,\n      encoding: 'utf-8',\n      stdio: ['pipe', 'pipe', 'pipe'],\n    });\n\n    console.log(`\\x1b[32m→ Committed: ${message}\\x1b[0m`);\n    context.commitResultJson = JSON.stringify({ committed: true, message });\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Commit failed: ${msg}\\x1b[0m`);\n    context.commitResultJson = JSON.stringify({ committed: false, reason: msg });\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"escStage":{"description":"Separates self-modify operations from the proposal, copies current files\nto backup, writes new content to staged, and creates the escrow token.","source":"/**\n * Separates self-modify operations from the proposal, copies current files\n * to backup, writes new content to staged, and creates the escrow token.\n *\n * @flowWeaver nodeType\n * @label Genesis Escrow Stage\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with escrow staging result (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport function genesisEscrowStage(ctx: string): {\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n} {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n  const proposal = JSON.parse(context.proposalJson!) as GenesisProposal;\n\n  const selfModifyTypes = new Set(['selfModifyWorkflow', 'selfModifyNodeType', 'selfModifyModule']);\n  const selfOps = proposal.operations.filter(op => selfModifyTypes.has(op.type));\n\n  if (selfOps.length === 0) {\n    context.hasSelfModifyOps = false;\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  // Resolve the pack root (parent of src/)\n  const packRoot = path.resolve(path.dirname(new URL(import.meta.url).pathname), '..', '..');\n\n  const store = new GenesisStore(env.projectDir);\n  store.ensureEscrowDirs();\n\n  const affectedFiles: string[] = [];\n  const stagedHashes: Record<string, string> = {};\n  const backupHashes: Record<string, string> = {};\n\n  try {\n    for (const op of selfOps) {\n      const relFile = op.args.file!;\n      const absFile = path.resolve(packRoot, relFile);\n      affectedFiles.push(relFile);\n\n      // Backup current file\n      if (fs.existsSync(absFile)) {\n        const backupDest = store.getEscrowBackupPath(relFile);\n        fs.mkdirSync(path.dirname(backupDest), { recursive: true });\n        fs.copyFileSync(absFile, backupDest);\n        backupHashes[relFile] = GenesisStore.hashFile(absFile);\n      }\n\n      // Write staged content\n      const stagedDest = store.getEscrowStagedPath(relFile);\n      fs.mkdirSync(path.dirname(stagedDest), { recursive: true });\n      fs.writeFileSync(stagedDest, op.args.content!, 'utf-8');\n      stagedHashes[relFile] = crypto.createHash('sha256')\n        .update(op.args.content!)\n        .digest('hex');\n    }\n\n    const gracePeriod = config.selfEvolveGracePeriod ?? 3;\n\n    const token: EscrowToken = {\n      migrationId: crypto.randomUUID().slice(0, 12),\n      cycleId: context.cycleId,\n      stagedAt: new Date().toISOString(),\n      phase: 'staged',\n      affectedFiles,\n      stagedFileHashes: stagedHashes,\n      backupFileHashes: backupHashes,\n      ownerPid: process.pid,\n      graceRemaining: gracePeriod,\n      graceCycleIds: [],\n    };\n\n    store.saveEscrowToken(token);\n\n    context.hasSelfModifyOps = true;\n    context.selfModifyOpsJson = JSON.stringify(selfOps);\n    context.escrowResultJson = JSON.stringify({ staged: true, migrationId: token.migrationId, files: affectedFiles });\n\n    console.log(`\\x1b[36m→ Escrow staged: ${affectedFiles.length} file(s), migration ${token.migrationId}\\x1b[0m`);\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Escrow staging failed: ${msg}\\x1b[0m`);\n    store.clearEscrow();\n    context.error = `Escrow staging failed: ${msg}`;\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"escVal":{"description":"Validates staged escrow files. For workflows, runs flow-weaver compile+validate\non a temp copy. For TypeScript modules, runs a transpile check.","source":"/**\n * Validates staged escrow files. For workflows, runs flow-weaver compile+validate\n * on a temp copy. For TypeScript modules, runs a transpile check.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Escrow Validate\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with escrow validation result (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport function genesisEscrowValidate(ctx: string): {\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n} {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const store = new GenesisStore(env.projectDir);\n  const token = store.loadEscrowToken();\n\n  if (!token || token.phase !== 'staged') {\n    context.error = 'No staged escrow token found';\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n\n  const packRoot = path.resolve(path.dirname(new URL(import.meta.url).pathname), '..', '..');\n\n  try {\n    for (const relFile of token.affectedFiles) {\n      const stagedPath = store.getEscrowStagedPath(relFile);\n      const content = fs.readFileSync(stagedPath, 'utf-8');\n\n      if (relFile.includes('workflows/')) {\n        // Workflow file: write to temp, run compile+validate\n        const tmpDir = fs.mkdtempSync(path.join(os.tmpdir(), 'escrow-validate-'));\n        const tmpFile = path.join(tmpDir, path.basename(relFile));\n        fs.writeFileSync(tmpFile, content, 'utf-8');\n\n        try {\n          execFileSync('npx', ['flow-weaver', 'compile', tmpFile], {\n            cwd: packRoot,\n            encoding: 'utf-8',\n            stdio: ['pipe', 'pipe', 'pipe'],\n            timeout: 30_000,\n          });\n\n          execFileSync('npx', ['flow-weaver', 'validate', tmpFile], {\n            cwd: packRoot,\n            encoding: 'utf-8',\n            stdio: ['pipe', 'pipe', 'pipe'],\n            timeout: 30_000,\n          });\n        } finally {\n          fs.rmSync(tmpDir, { recursive: true, force: true });\n        }\n      } else {\n        // TypeScript module: transpile check using tsc --noEmit on a temp file\n        const tmpDir = fs.mkdtempSync(path.join(os.tmpdir(), 'escrow-tsc-'));\n        const tmpFile = path.join(tmpDir, path.basename(relFile));\n        fs.writeFileSync(tmpFile, content, 'utf-8');\n\n        // Write a minimal tsconfig for the check\n        const tsconfig = {\n          compilerOptions: {\n            target: 'ES2022',\n            module: 'Node16',\n            moduleResolution: 'Node16',\n            noEmit: true,\n            strict: true,\n            skipLibCheck: true,\n            esModuleInterop: true,\n          },\n          include: [path.basename(relFile)],\n        };\n        fs.writeFileSync(path.join(tmpDir, 'tsconfig.json'), JSON.stringify(tsconfig), 'utf-8');\n\n        try {\n          execFileSync('npx', ['tsc', '--project', path.join(tmpDir, 'tsconfig.json')], {\n            cwd: tmpDir,\n            encoding: 'utf-8',\n            stdio: ['pipe', 'pipe', 'pipe'],\n            timeout: 30_000,\n          });\n        } finally {\n          fs.rmSync(tmpDir, { recursive: true, force: true });\n        }\n      }\n    }\n\n    token.phase = 'validated';\n    token.validationResult = { compiled: true, validated: true };\n    store.saveEscrowToken(token);\n\n    console.log('\\x1b[32m→ Escrow validation passed\\x1b[0m');\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n\n    token.phase = 'rolled-back';\n    token.rollbackReason = `Validation failed: ${msg.slice(0, 500)}`;\n    token.validationResult = { compiled: false, validated: false, error: msg.slice(0, 500) };\n    store.saveEscrowToken(token);\n\n    // Clean up staged files\n    for (const relFile of token.affectedFiles) {\n      try { fs.unlinkSync(store.getEscrowStagedPath(relFile)); } catch { /* ignore */ }\n    }\n\n    store.appendSelfMigration({\n      migrationId: token.migrationId,\n      cycleId: token.cycleId,\n      timestamp: new Date().toISOString(),\n      affectedFiles: token.affectedFiles,\n      outcome: 'rolled-back',\n      graceCompleted: false,\n      rollbackReason: token.rollbackReason,\n    });\n\n    console.error(`\\x1b[31m→ Escrow validation failed: ${msg.slice(0, 200)}\\x1b[0m`);\n    context.error = `Escrow validation failed: ${msg.slice(0, 200)}`;\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"escMig":{"description":"Copies staged files to their actual pack locations, completing the\nself-modification migration. Uses a file lock to prevent concurrent access.","source":"/**\n * Copies staged files to their actual pack locations, completing the\n * self-modification migration. Uses a file lock to prevent concurrent access.\n *\n * @flowWeaver nodeType\n * @label Genesis Escrow Migrate\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with migration result (JSON)\n * @output onSuccess [order:-2] - On Success\n * @output onFailure [order:-1] [hidden] - On Failure\n */\nexport async function genesisEscrowMigrate(\n  execute: boolean,\n  ctx: string,\n): Promise<{\n  onSuccess: boolean; onFailure: boolean;\n  ctx: string;\n}> {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const store = new GenesisStore(env.projectDir);\n  const token = store.loadEscrowToken();\n\n  if (!execute) {\n    context.escrowResultJson = JSON.stringify({ migrated: false, reason: 'dry run' });\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  }\n\n  if (!token || token.phase !== 'validated') {\n    context.error = 'No validated escrow token found';\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n\n  const packRoot = path.resolve(path.dirname(new URL(import.meta.url).pathname), '..', '..');\n  const lockPath = path.join(env.projectDir, '.genesis', 'escrow', 'migrate');\n\n  try {\n    await withFileLock(lockPath, () => {\n      // Re-read token inside lock to confirm state\n      const lockedToken = store.loadEscrowToken();\n      if (!lockedToken || lockedToken.phase !== 'validated') {\n        throw new Error('Token state changed during lock acquisition');\n      }\n\n      lockedToken.phase = 'migrating';\n      store.saveEscrowToken(lockedToken);\n\n      // Copy each staged file to actual location\n      for (const relFile of lockedToken.affectedFiles) {\n        const stagedPath = store.getEscrowStagedPath(relFile);\n        const destPath = path.resolve(packRoot, relFile);\n\n        fs.mkdirSync(path.dirname(destPath), { recursive: true });\n        fs.copyFileSync(stagedPath, destPath);\n      }\n\n      lockedToken.phase = 'migrated';\n      lockedToken.migratedAt = new Date().toISOString();\n      store.saveEscrowToken(lockedToken);\n    });\n\n    console.log(`\\x1b[32m→ Escrow migration complete: ${token.affectedFiles.length} file(s) swapped\\x1b[0m`);\n    context.escrowResultJson = JSON.stringify({\n      migrated: true,\n      migrationId: token.migrationId,\n      files: token.affectedFiles,\n    });\n    return { onSuccess: true, onFailure: false, ctx: JSON.stringify(context) };\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Escrow migration failed: ${msg}\\x1b[0m`);\n\n    // Attempt rollback\n    rollbackFromBackup(store, token, packRoot, `Migration failed: ${msg}`);\n\n    context.error = `Escrow migration failed: ${msg}`;\n    return { onSuccess: false, onFailure: true, ctx: JSON.stringify(context) };\n  }\n}","ports":{"ctx":{"type":"ANY"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"history":{"description":"Builds a cycle record from all available data, determines the outcome,\nappends it to the genesis history, and saves the current fingerprint.","source":"/**\n * Builds a cycle record from all available data, determines the outcome,\n * appends it to the genesis history, and saves the current fingerprint.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Update History\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context with cycleRecordJson (JSON)\n * @output onFailure [hidden]\n */\nexport function genesisUpdateHistory(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n\n  const fingerprint = context.fingerprintJson\n    ? JSON.parse(context.fingerprintJson) as GenesisFingerprint\n    : null;\n  const proposal = context.proposalJson ? JSON.parse(context.proposalJson) as GenesisProposal : null;\n  const applyResult = context.applyResultJson ? JSON.parse(context.applyResultJson) as { applied: number; failed: number; errors: string[] } : null;\n\n  const durationMs = context.startTimeMs ? Date.now() - context.startTimeMs : 0;\n\n  // Determine outcome\n  let outcome: GenesisCycleRecord['outcome'];\n  if (context.error) {\n    outcome = 'error';\n  } else if (!proposal || proposal.operations.length === 0) {\n    outcome = 'no-change';\n  } else if (context.approved === false) {\n    outcome = 'rejected';\n  } else if (applyResult && applyResult.failed > 0) {\n    outcome = 'rolled-back';\n  } else if (context.approved === true && applyResult && applyResult.failed === 0) {\n    outcome = 'applied';\n  } else {\n    outcome = 'error';\n  }\n\n  const record: GenesisCycleRecord = {\n    id: context.cycleId,\n    timestamp: new Date().toISOString(),\n    durationMs,\n    fingerprint: fingerprint!,\n    proposal,\n    outcome,\n    diffSummary: proposal?.summary ?? null,\n    approvalRequired: context.approved !== undefined,\n    approved: context.approved ?? null,\n    error: context.error ?? (applyResult?.errors?.length ? applyResult.errors.join('; ') : null),\n    snapshotFile: context.snapshotPath ?? null,\n  };\n\n  try {\n    const store = new GenesisStore(env.projectDir);\n    store.appendCycle(record);\n    if (fingerprint) {\n      store.saveFingerprint(fingerprint);\n    }\n  } catch (err: unknown) {\n    const msg = err instanceof Error ? err.message : String(err);\n    console.error(`\\x1b[31m→ Failed to save history: ${msg}\\x1b[0m`);\n  }\n\n  console.log(`\\x1b[36m→ Cycle ${context.cycleId}: ${outcome} (${durationMs}ms)\\x1b[0m`);\n\n  context.cycleRecordJson = JSON.stringify(record);\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"escGrace":{"description":"Handles escrow grace period tracking at the end of each cycle.\nDecrements grace on success, triggers rollback on failure, and\nclears escrow once the grace period completes.","source":"/**\n * Handles escrow grace period tracking at the end of each cycle.\n * Decrements grace on success, triggers rollback on failure, and\n * clears escrow once the grace period completes.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Escrow Grace\n * @input ctx [order:0] - Genesis context (JSON)\n * @output ctx [order:0] - Genesis context (JSON)\n */\nexport function genesisEscrowGrace(ctx: string): { ctx: string } {\n  const context = JSON.parse(ctx) as GenesisContext;\n  const { env } = context;\n  const config = JSON.parse(context.genesisConfigJson) as GenesisConfig;\n\n  if (!config.selfEvolve) {\n    return { ctx: JSON.stringify(context) };\n  }\n\n  const store = new GenesisStore(env.projectDir);\n  const token = store.loadEscrowToken();\n\n  if (!token || token.phase !== 'migrated' || token.graceRemaining <= 0) {\n    return { ctx: JSON.stringify(context) };\n  }\n\n  const packRoot = path.resolve(path.dirname(new URL(import.meta.url).pathname), '..', '..');\n\n  // Cycle failed during grace: rollback\n  if (context.error) {\n    rollbackFromBackup(store, token, packRoot, `Grace cycle failed: ${context.error}`);\n    return { ctx: JSON.stringify(context) };\n  }\n\n  // Cycle succeeded: decrement grace\n  token.graceRemaining--;\n  token.graceCycleIds.push(context.cycleId);\n  store.saveEscrowToken(token);\n\n  console.log(`\\x1b[36m→ Grace period: ${token.graceRemaining} cycle(s) remaining\\x1b[0m`);\n\n  if (token.graceRemaining <= 0) {\n    store.appendSelfMigration({\n      migrationId: token.migrationId,\n      cycleId: token.cycleId,\n      timestamp: new Date().toISOString(),\n      affectedFiles: token.affectedFiles,\n      outcome: 'grace-cleared',\n      graceCompleted: true,\n    });\n    store.clearEscrow();\n    console.log('\\x1b[32m→ Grace period complete, self-modification accepted\\x1b[0m');\n  }\n\n  return { ctx: JSON.stringify(context) };\n}","ports":{"ctx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"report":{"description":"Formats a genesis cycle summary for console output. Receives context\nfrom either the success path or the fail path. Fires from any\nincoming path.","source":"/**\n * Formats a genesis cycle summary for console output. Receives context\n * from either the success path or the fail path. Fires from any\n * incoming path.\n *\n * @flowWeaver nodeType\n * @expression\n * @label Genesis Report\n * @executeWhen DISJUNCTION\n * @input [successCtx] [order:0] - Genesis context from success path (JSON)\n * @input [failCtx] [order:1] - Genesis context from apply-retry fail path (JSON)\n * @input [proposeFailCtx] [order:2] - Genesis context from propose failure (JSON)\n * @input [commitFailCtx] [order:3] - Genesis context from commit failure (JSON)\n * @output summary [order:1] - Formatted summary text\n * @output onFailure [hidden]\n */\nexport function genesisReport(successCtx?: string, failCtx?: string, proposeFailCtx?: string, commitFailCtx?: string): { summary: string } {\n  const ctx = successCtx ?? failCtx ?? proposeFailCtx ?? commitFailCtx;\n  if (!ctx) {\n    const summary = 'Genesis cycle completed with no record';\n    console.log(`\\n\\x1b[33m${summary}\\x1b[0m\\n`);\n    return { summary };\n  }\n\n  const context = JSON.parse(ctx) as GenesisContext;\n  const elapsed = formatElapsed(context.startTimeMs);\n\n  if (context.error) {\n    const reason = categorizeFailure(context);\n    let summary = `Genesis: ${reason}`;\n    if (context.applyResultJson) {\n      try {\n        const result = JSON.parse(context.applyResultJson) as { applied: number; failed: number };\n        summary += ` (applied: ${result.applied}, failed: ${result.failed})`;\n      } catch { /* ignore */ }\n    }\n    summary += elapsed ? ` [${elapsed}]` : '';\n    console.log(`\\n\\x1b[31m${summary}\\x1b[0m\\n`);\n    return { summary };\n  }\n\n  if (!context.cycleRecordJson) {\n    const summary = `Genesis: no changes proposed${elapsed ? ` [${elapsed}]` : ''}`;\n    console.log(`\\n\\x1b[33m${summary}\\x1b[0m\\n`);\n    return { summary };\n  }\n\n  const record = JSON.parse(context.cycleRecordJson) as GenesisCycleRecord;\n\n  const parts: string[] = [`Cycle ${record.id}`];\n\n  if (record.proposal) {\n    parts.push(`${record.proposal.operations.length} ops`);\n    parts.push(`impact=${record.proposal.impactLevel}`);\n  }\n\n  parts.push(record.outcome);\n\n  if (record.approved !== null) {\n    parts.push(record.approved ? 'approved' : 'rejected');\n  }\n\n  if (elapsed) parts.push(elapsed);\n\n  if (record.error) {\n    parts.push(record.error);\n  }\n\n  const summary = `Genesis: ${parts.join(' | ')}`;\n  const color = record.outcome === 'applied' ? '\\x1b[32m' : record.outcome === 'error' ? '\\x1b[31m' : '\\x1b[33m';\n\n  console.log(`\\n\\x1b[1m${color}${summary}\\x1b[0m\\n`);\n\n  return { summary };\n}","ports":{"successCtx":{"type":"STRING","tsType":"string"},"failCtx":{"type":"STRING","tsType":"string"},"proposeFailCtx":{"type":"STRING","tsType":"string"},"commitFailCtx":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"summary":{"type":"STRING","tsType":"string"},"onFailure":{"type":"STEP"},"onSuccess":{"type":"STEP"}}},"Start":{"ports":{"execute":{"type":"STEP","tsType":"boolean"},"projectDir":{"type":"STRING","tsType":"string"}}},"Exit":{"ports":{"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"},"summary":{"type":"STRING"}}}};</script>
<script>
(function() {
  'use strict';

  var MIN_ZOOM = 0.25, MAX_ZOOM = 3;
  var canvas = document.getElementById('canvas');
  var content = document.getElementById('diagram');
  var zoomLabel = document.getElementById('zoom-label');
  var infoPanel = document.getElementById('info-panel');
  var infoTitle = document.getElementById('info-title');
  var infoBody = document.getElementById('info-body');
  var btnExpand = document.getElementById('btn-expand');
  var btnClosePanel = document.getElementById('btn-close-panel');

    if (!isSelf && to[0] > from[0]) {
      var cy = (from[1] + to[1]) / 2;
      var intBoxes = [];
      for (var i = 0; i < iboxes.length; i++) { var b = iboxes[i]; if (b.l < xx && b.r > xn) intBoxes.push(b); }
      if (intBoxes.length >= 2) {
        var ct = Infinity, cb = -Infinity;
        for (var i = 0; i < intBoxes.length; i++) { ct = Math.min(ct, intBoxes[i].t); cb = Math.max(cb, intBoxes[i].b); }

      }

      if (Math.abs(from[1] - to[1]) < JOG_THRESHOLD && Math.abs(clearY - from[1]) < JOG_THRESHOLD) return null;

      var midX = (se[0] + sn[0]) / 2, ymn = Math.min(from[1], to[1]), ymx = Math.max(from[1], to[1]);
      var cmx = findClearX(ymn, ymx, midX, iboxes);
      var fmx = alloc.findFreeX(ymn, ymx, cmx, iboxes);
      if (ymx - ymn >= JOG_THRESHOLD && fmx > se[0] && fmx < sn[0] &&

          alloc.findFreeY(from[0], fmx, from[1], iboxes) === from[1] &&
          alloc.findFreeY(fmx, to[0], to[1], iboxes) === to[1]) {
        alloc.claim(from[0], fmx, from[1]); alloc.claim(fmx, to[0], to[1]); alloc.claimV(ymn, ymx, fmx);
        return simplifyWaypoints([from, [fmx, from[1]], [fmx, to[1]], to]);
      }

      clearY = alloc.findFreeY(xn, xx, clearY, iboxes);
      if (Math.abs(clearY - from[1]) < JOG_THRESHOLD && !iboxes.some(function(b) { return segOvlp(xn, xx, from[1], b); })) clearY = from[1];
      else if (Math.abs(clearY - to[1]) < JOG_THRESHOLD && !iboxes.some(function(b) { return segOvlp(xn, xx, to[1], b); })) clearY = to[1];
      alloc.claim(xn, xx, clearY);

      var eymn = Math.min(from[1], clearY), eymx = Math.max(from[1], clearY);
      var exX = findClearX(eymn, eymx, se[0], iboxes); exX = alloc.findFreeX(eymn, eymx, exX, iboxes);
      if (exX < from[0]) { exX = se[0]; if (!vSegClear(exX, eymn, eymx, iboxes)) { exX = findClearX(eymn, eymx, se[0] + TRACK_SPACING, iboxes); exX = alloc.findFreeX(eymn, eymx, exX, iboxes); } }
      alloc.claimV(eymn, eymx, exX);

      var nymn = Math.min(to[1], clearY), nymx = Math.max(to[1], clearY);
      var nxX = findClearX(nymn, nymx, sn[0], iboxes); nxX = alloc.findFreeX(nymn, nymx, nxX, iboxes);
      if (nxX > to[0]) { nxX = sn[0]; if (!vSegClear(nxX, nymn, nymx, iboxes)) { nxX = findClearX(nymn, nymx, sn[0] - TRACK_SPACING, iboxes); nxX = alloc.findFreeX(nymn, nymx, nxX, iboxes); } }
      alloc.claimV(nymn, nymx, nxX);

      return simplifyWaypoints([from, [exX, from[1]], [exX, clearY], [nxX, clearY], [nxX, to[1]], to]);
    } else {
      var srcBox = null, tgtBox = null;
      for (var i = 0; i < nboxes.length; i++) { if (nboxes[i].id === srcId) srcBox = nboxes[i]; if (nboxes[i].id === tgtId) tgtBox = nboxes[i]; }
      var corBoxes = []; for (var i = 0; i < iboxes.length; i++) { var b = iboxes[i]; if (b.l < xx && b.r > xn) corBoxes.push(b); }
      var bots = corBoxes.map(function(b) { return b.b; }), tops = corBoxes.map(function(b) { return b.t; });
      if (srcBox) { bots.push(srcBox.y + srcBox.h + pad); tops.push(srcBox.y - pad); }
      if (tgtBox) { bots.push(tgtBox.y + tgtBox.h + pad); tops.push(tgtBox.y - pad); }
      var maxBot = Math.max.apply(null, bots.concat([from[1] + 50, to[1] + 50]));
      var minTop = Math.min.apply(null, tops.concat([from[1] - 50, to[1] - 50]));
      var avgY = (from[1] + to[1]) / 2;
      var escBelow = maxBot + pad, escAbove = minTop - pad;
      var escY = Math.abs(escAbove - avgY) <= Math.abs(escBelow - avgY) ? escAbove : escBelow;
      escY = findClearY(xn, xx, escY, iboxes); escY = alloc.findFreeY(xn, xx, escY, iboxes); alloc.claim(xn, xx, escY);

      var bymn = Math.min(from[1], escY), bymx = Math.max(from[1], escY);
      var bexX = findClearX(bymn, bymx, se[0], iboxes); bexX = alloc.findFreeX(bymn, bymx, bexX, iboxes); alloc.claimV(bymn, bymx, bexX);

      var bnmn = Math.min(to[1], escY), bnmx = Math.max(to[1], escY);
      var bnxX = findClearX(bnmn, bnmx, sn[0], iboxes); bnxX = alloc.findFreeX(bnmn, bnmx, bnxX, iboxes); alloc.claimV(bnmn, bnmx, bnxX);

      return simplifyWaypoints([from, [bexX, from[1]], [bexX, escY], [bnxX, escY], [bnxX, to[1]], to]);
